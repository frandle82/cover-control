[tox]
envlist = py310, lint

[testenv]
description = Run pytest suite for the integration
basepython = python3.10
skip_install = true
deps =
    homeassistant==2023.7.3
    pytest-homeassistant-custom-component
commands =
    pytest {posargs}

[testenv:lint]
description = Run lightweight static checks
basepython = python3.10
skip_install = true
deps =
    ruff==0.6.8
    mypy==1.11.2
commands =
    ruff check custom_components tests
    python -m py_compile custom_components/cover_control/config_flow.py
