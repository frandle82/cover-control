[coverage:run]
source =
  custom_components

[coverage:report]
exclude_lines =
    pragma: no cover
show_missing = true

[tool:pytest]
testpaths = tests
norecursedirs =
    .git
addopts =
    --strict-markers
    --cov=custom_components
    --cov-report=term-missing
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:homeassistant.*:

